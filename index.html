<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f4f8;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .score {
            font-size: 20px;
            color: #e74c3c;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #gameCanvas {
            border: 3px solid #34495e;
            background-color: #ffffff;
        }
        .tip {
            margin-top: 12px;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>经典贪吃蛇</h1>
    <div class="score">得分：<span id="scoreNum">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="tip">按 ↑↓←→ 控制方向</div>

    <script>
        // 获取画布与上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreNum');

        // 基础配置
        const grid = 20; // 格子大小
        let snake = [{x: 10, y: 10}]; // 蛇初始位置
        let food = spawnFood(); // 食物位置
        let dir = {x: 0, y: 0}; // 移动方向
        let score = 0;
        let gameLoop;

        // 随机生成食物
        function spawnFood() {
            return {
                x: Math.floor(Math.random() * canvas.width / grid),
                y: Math.floor(Math.random() * canvas.height / grid)
            };
        }

        // 绘制方块
        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * grid, y * grid, grid - 1, grid - 1);
        }

        // 游戏主逻辑
        function gameUpdate() {
            // 清画布
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 移动蛇头
            let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            snake.unshift(head);

            // 判断吃到食物
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreText.innerText = score;
                food = spawnFood();
            } else {
                snake.pop(); // 没吃到就删掉尾巴
            }

            // 撞墙判定
            if (
                head.x < 0 || head.x >= canvas.width / grid ||
                head.y < 0 || head.y >= canvas.height / grid
            ) {
                clearInterval(gameLoop);
                alert(`游戏结束！最终得分：${score}`);
                location.reload();
            }

            // 撞自己判定
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    clearInterval(gameLoop);
                    alert(`游戏结束！最终得分：${score}`);
                    location.reload();
                }
            }

            // 画蛇
            snake.forEach((item, index) => {
                drawBlock(item.x, item.y, index === 0 ? '#27ae60' : '#2ecc71');
            });

            // 画食物
            drawBlock(food.x, food.y, '#e74c3c');
        }

        // 键盘控制方向
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowUp' && dir.y !== 1) dir = {x: 0, y: -1};
            if (key === 'ArrowDown' && dir.y !== -1) dir = {x: 0, y: 1};
            if (key === 'ArrowLeft' && dir.x !== 1) dir = {x: -1, y: 0};
            if (key === 'ArrowRight' && dir.x !== -1) dir = {x: 1, y: 0};
        });

        // 启动游戏
        gameLoop = setInterval(gameUpdate, 120);
    </script>
</body>
</html>
