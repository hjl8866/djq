<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            color: #fff;
            font-size: 1.2em;
        }

        .score, .high-score {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid #e94560;
        }

        .score span, .high-score span {
            color: #e94560;
            font-weight: bold;
        }

        canvas {
            border: 4px solid #e94560;
            border-radius: 10px;
            background: #0a0a0a;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        .controls {
            margin-top: 20px;
            color: #aaa;
        }

        .controls p {
            margin: 5px 0;
        }

        .btn {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #e94560;
            display: none;
            z-index: 10;
        }

        .game-over h2 {
            color: #e94560;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            margin-top: 20px;
        }

        .mobile-controls .row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 5px 0;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            background: rgba(233, 69, 96, 0.3);
            border: 2px solid #e94560;
            border-radius: 10px;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-btn:active {
            background: rgba(233, 69, 96, 0.6);
        }

        @media (max-width: 500px) {
            canvas {
                width: 300px;
                height: 300px;
            }
            
            .mobile-controls {
                display: block;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="high-score">最高分: <span id="highScore">0</span></div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="game-over" id="gameOver">
                <h2>游戏结束!</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <div class="controls">
            <p>使用方向键 ↑ ↓ ← → 控制蛇的移动</p>
            <p>按空格键暂停/继续游戏</p>
        </div>
        
        <div class="mobile-controls">
            <div class="row">
                <button class="mobile-btn" onclick="changeDirection('up')">↑</button>
            </div>
            <div class="row">
                <button class="mobile-btn" onclick="changeDirection('left')">←</button>
                <button class="mobile-btn" onclick="changeDirection('down')">↓</button>
                <button class="mobile-btn" onclick="changeDirection('right')">→</button>
            </div>
        </div>
        
        <button class="btn" onclick="restartGame()">开始游戏</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isPaused = false;
        let isGameOver = false;
        
        // 初始化
        function init() {
            document.getElementById('highScore').textContent = highScore;
            resetGame();
        }
        
        function resetGame() {
            // 初始化蛇的位置（从中间开始）
            snake = [
                { x: 7, y: 10 },
                { x: 6, y: 10 },
                { x: 5, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 100;
            isPaused = false;
            isGameOver = false;
            
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            
            generateFood();
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
        }
        
        // 生成食物
        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (isSnakeAt(food.x, food.y));
        }
        
        // 检查蛇是否在指定位置
        function isSnakeAt(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }
        
        // 更新游戏状态
        function update() {
            if (isPaused || isGameOver) return;
            
            direction = nextDirection;
            
            // 计算新的头部位置
            const head = { ...snake[0] };
            
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 检查碰撞
            if (head.x < 0 || head.x >= tileCount || 
                head.y < 0 || head.y >= tileCount ||
                isSnakeAt(head.x, head.y)) {
                gameOver();
                return;
            }
            
            // 移动蛇
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                
                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
                
                // 加速
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
                
                generateFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        // 绘制游戏画面
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格（可选，增加视觉效果）
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00ff88';
                } else {
                    // 蛇身
                    const gradient = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(0, 255, 136, ${gradient})`;
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                // 绘制蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    ctx.shadowBlur = 0;
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    if (direction === 'right' || direction === 'left') {
                        ctx.fillRect(
                            segment.x * gridSize + (direction === 'right' ? 14 : 4),
                            segment.y * gridSize + eyeOffset,
                            eyeSize, eyeSize
                        );
                        ctx.fillRect(
                            segment.x * gridSize + (direction === 'right' ? 14 : 4),
                            segment.y * gridSize + gridSize - eyeOffset - eyeSize,
                            eyeSize, eyeSize
                        );
                    } else {
                        ctx.fillRect(
                            segment.x * gridSize + eyeOffset,
                            segment.y * gridSize + (direction === 'down' ? 14 : 4),
                            eyeSize, eyeSize
                        );
                        ctx.fillRect(
                            segment.x * gridSize + gridSize - eyeOffset - eyeSize,
                            segment.y * gridSize + (direction === 'down' ? 14 : 4),
                            eyeSize, eyeSize
                        );
                    }
                }
            });
            
            // 绘制食物
            ctx.fillStyle = '#e94560';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#e94560';
            
            const centerX = food.x * gridSize + gridSize / 2;
            const centerY = food.y * gridSize + gridSize / 2;
            const radius = gridSize / 2 - 2;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 食物高光
            ctx.fillStyle = '#ff9999';
            ctx.beginPath();
            ctx.arc(centerX - 3, centerY - 3, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }
        
        // 游戏结束
        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 重新开始游戏
        function restartGame() {
            resetGame();
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    e.preventDefault();
                    break;
                case ' ':
                    isPaused = !isPaused;
                    e.preventDefault();
                    break;
            }
        });
        
        // 移动端控制
        function changeDirection(dir) {
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            if (direction !== opposites[dir]) {
                nextDirection = dir;
            }
        }
        
        // 初始化游戏
        init();
        draw();
    </script>
</body>
</html>
